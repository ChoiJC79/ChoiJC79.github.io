<!DOCTYPE html>

  <html lang="ko">

  <head>

      <meta charset="UTF-8">

      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <title>최JC79 | 지방행정 연구자</title>

      <link rel="stylesheet" href="style.css">

  </head>

  <body>

      <!-- 헤더 -->

      <header class="header">

          <div class="header-container">

              <h1 class="logo">최JC79</h1>

              <nav class="nav">

                  <a href="index.html" class="nav-link active">홈</a>

                  <a href="writings.html" class="nav-link">글쓰기</a>

              </nav>

          </div>

      </header>

      <!-- 메인 콘텐츠 -->

      <main class="main-container">

          <!-- 환영 섹션 -->

          <section class="welcome-section">

              <h1 class="welcome-title">환영합니다</h1>

              <p class="welcome-subtitle">지방행정 연구자 최JC79의 블로그</p>

          </section>

          <!-- 카드 그리드 -->

          <section class="cards-container">

              <!-- 첫 번째 행: 주요 카테고리 -->

              <div class="card card-primary" data-modal="about">

                  <div class="card-emoji">👋</div>

                  <h3 class="card-title">소개</h3>

                  <p class="card-desc">나는 누구인가</p>

              </div>

              <div class="card card-primary" data-modal="writings-link">

                  <div class="card-emoji">✍️</div>

                  <h3 class="card-title">글쓰기</h3>

                  <p class="card-desc">일기와 리뷰</p>

              </div>

              <div class="card card-primary" data-modal="research">

                  <div class="card-emoji">📚</div>

                  <h3 class="card-title">연구</h3>

                  <p class="card-desc">연구 주제 및 활동</p>

              </div>

              <!-- 두 번째 행: 외부 링크 -->

              <a href="https://www.jcnews.co.kr/" target="_blank" class="card card-link">

                  <div class="card-emoji">📰</div>

                  <h3 class="card-title">제천인터넷뉴스</h3>

                  <p class="card-desc">지역 뉴스</p>

              </a>

              <a href="https://www.newsjn.com/" target="_blank" class="card card-link">

                  <div class="card-emoji">📑</div>

                  <h3 class="card-title">뉴스저널</h3>

                  <p class="card-desc">저널 보기</p>

              </a>

              <div class="card card-primary" data-modal="contact">

                  <div class="card-emoji">📞</div>

                  <h3 class="card-title">연락하기</h3>

                  <p class="card-desc">나와 연결하기</p>

              </div>

              <!-- 세 번째 행: 추가 정보 -->

              <div class="card card-primary" data-modal="timeline">

                  <div class="card-emoji">📅</div>

                  <h3 class="card-title">일정</h3>

                  <p class="card-desc">주요 일정</p>

              </div>

              <div class="card card-primary" data-modal="projects">

                  <div class="card-emoji">🔧</div>

                  <h3 class="card-title">프로젝트</h3>

                  <p class="card-desc">진행 중인 프로젝트</p>

              </div>

          </section>

      </main>

      <!-- 모달 -->

      <div class="modal" id="modal">

          <div class="modal-overlay" id="modalOverlay"></div>

          <div class="modal-content">

              <button class="modal-close" id="modalClose">&times;</button>

              <div id="modalBody"></div>

          </div>

      </div>

      <script src="script.js"></script>

  </body>

  </html>
